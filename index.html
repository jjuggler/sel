<script>
// ============================================================
//  상태
// ============================================================
const state = window.state = {
  fbReady:false, fbUnsubscribe:null, clientId:'c_'+Math.random().toString(36).slice(2,9), _localUpdatedAt:0,
  me:null,                 // { sid, name, cls }
  view:'login',            // 현재 화면
  draft:{},                // 학생 작성 중 임시 데이터
  students:{},             // { sid:{ pinHash, name, cls, status } }  status: active|in|out|quit
  roster:{},               // { sid:{ grade, cls, num, name } } 명렬표
  submissions:{},          // { sid:[ {ts, ...9단계 데이터, reflectGrade} ] }
  peer:{ praise:[], advice:[] },
  tests:{},                // { sid:{ pre:{ts,answers,scores}, post:{...} } }
  classSessions:{},        // { 반: { count, dblDays:[] } }
  settings:{
    adminPass:(typeof window!=='undefined'&&window.initialAdminPass)||'4550', appTitle:'인성 실천 포트폴리오',
    schoolName:'', schoolLogo:'', sessionOverride:{},
    totalSessions:15, fullMarkCount:14, maxScore:25, gap:4, steps:5, minBound:null,
    testMode:'sel',
    preSession:1, postSession:15, postGraceWeeks:2,
    peerPerReport:5, peerMaxBonus:3,
    flagDupSubmit:true, flagDupText:true, reflectGate:true, aiSuggest:true,
    content:null
  }
};
const ADMIN_DEFAULT_PIN='4550';
function adminPass(){ return state.settings.adminPass || state.settings.teacherPin || ADMIN_DEFAULT_PIN; }
function content(){ const c=state.settings&&state.settings.content; if(!c) return window.DEFAULT_CONTENT; return Object.assign({}, window.DEFAULT_CONTENT, c); }
function makeSid(grade,cls,num){ return String(grade).trim()+String(cls).trim().padStart(2,'0')+String(num).trim().padStart(2,'0'); }
function clsOf(sid){ return (sid||'').slice(0,3); }  // 학년+반 (예: 102)
function nameOf(sid){ return (state.roster[sid]&&state.roster[sid].name) || (state.students[sid]&&state.students[sid].name) || ''; }

// ============================================================
//  유틸
// ============================================================
function $(s){ return document.querySelector(s); }
function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; }
function setAppWide(on){ const a=document.getElementById('app'); if(!a) return; if(on){ a.classList.remove('max-w-md'); a.classList.add('max-w-5xl'); } else { a.classList.remove('max-w-5xl'); a.classList.add('max-w-md'); } }
function esc(s){ return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayKey(ts){ const d=new Date(ts||Date.now()); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
let _tt=null;
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.remove('hidden'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.add('hidden'),1900); }
function modal(node){ $('#modal-root').appendChild(node); }
function closeModal(id){ const m=document.getElementById(id); if(m) m.remove(); }
async function hashPin(sid,pin){ const data=new TextEncoder().encode('insung:'+sid+':'+pin); const buf=await crypto.subtle.digest('SHA-256',data); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
async function copyClip(text){ try{ await navigator.clipboard.writeText(text); toast('복사했어요 📋'); }catch(e){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} document.body.removeChild(ta); toast('복사했어요 📋'); } }

function setSync(status,msg){
  const bar=$('#sync-bar');
  const map={ online:['☁️ 동기화됨','bg-teal-600 text-white'], local:['📱 이 기기에만 저장','bg-amber-500 text-white'], error:['⚠️ 연결 오류','bg-red-600 text-white'] };
  const [text,cls]=map[status]||map.local;
  bar.className='fixed top-0 inset-x-0 z-40 text-[11px] text-center py-1 font-medium '+cls;
  bar.style.paddingTop='calc(var(--safe-top) + 2px)'; bar.textContent=text+(msg?(' · '+msg):''); bar.classList.remove('hidden');
  // 정상 동기화는 잠깐만 보여주고 자동으로 숨김(화면 안 가림). 오류·로컬저장은 계속 표시.
  if(window._syncHideTimer){ clearTimeout(window._syncHideTimer); window._syncHideTimer=null; }
  if(status==='online'){ window._syncHideTimer=setTimeout(()=>{ bar.classList.add('hidden'); }, 1800); }
}

// ============================================================
//  채점 로직
// ============================================================
function scoreLadder(){
  const s=state.settings; const out=[];
  for(let i=0;i<s.steps;i++){ out.push(Math.max(0, s.maxScore - s.gap*i)); }
  return out; // [만점, ..., 최하]
}
function countBounds(){
  // 만점 받는 최소 횟수(fullMarkCount)부터 균등 분할
  const s=state.settings; const steps=s.steps; const full=s.fullMarkCount;
  const b=[full]; const seg=(full-1)/(steps-1);
  for(let i=1;i<steps-1;i++){ b.push(Math.max(1, Math.round(full-seg*i))); }
  b.push(1);
  return b; // 길이 steps, 내림차순
}
function submitCount(sid){
  // 두 가지 집계:
  //  · 홈(학생) = 입력한 그대로(미흡 포함) → daily / enteredTotal
  //  · 평가/관리자 = 교사 확정 미흡 제외 → direct / total
  const subs=state.submissions[sid]||[];
  const dailyAll=subs.filter(x=>!x.isTest);
  const dailyN=dailyAll.length;                                   // 일상 전부(미흡 포함)
  const weak=dailyAll.filter(x=>x.reflectGrade==='미흡' && x.teacherConfirmed).length; // 교사 확정 미흡
  const weakAll=dailyAll.filter(x=>x.reflectGrade==='미흡').length;                     // 전체 미흡(미확정 포함)
  const testCnt=subs.filter(x=>x.isTest).length;
  const peerCnt=peerBonusCount(sid);
  const bonus=Math.min(state.settings.peerMaxBonus, Math.floor(peerCnt/state.settings.peerPerReport));
  return { daily:dailyN, direct:dailyN-weak, weak, weakAll, test:testCnt, bonus, peerCnt,
           enteredTotal:dailyN+testCnt+bonus,   // 홈 누적(입력 그대로)
           total:(dailyN-weak)+testCnt+bonus };  // 평가용 누적
}
function peerBonusCount(sid){
  // 내가(=fromSid) 작성한 칭찬+개선을 하루 1건으로 집계(교사 인정 불필요)
  const all=[...state.peer.praise, ...state.peer.advice].filter(p=>p.fromSid===sid);
  const days={}; all.forEach(p=>{ days[todayKey(p.ts)]=true; });
  return Object.keys(days).length;
}
function scoreOf(sid){
  const c=submitCount(sid).total;
  const ladder=scoreLadder(); const bounds=countBounds();
  for(let i=0;i<bounds.length;i++){ if(c>=bounds[i]) return ladder[i]; }
  return ladder[ladder.length-1];
}

// ============================================================
//  검사 결과 분석 (연구 기준: 5점→100점 환산, 75점=준거, 낮음/보통/높음)
// ============================================================
function toHundred(avg5){ return Math.round((avg5-1)/4*100); }  // 1~5 → 0~100
function gradeOf(h){ return h>=75?'높음': h>=50?'보통':'낮음'; }
function gradeColor(h){ return h>=75?'#0d9488': h>=50?'#f59e0b':'#ef4444'; }
function testAvg(scores){ const v=Object.values(scores||{}); return v.length? v.reduce((a,b)=>a+b,0)/v.length : 0; }

// ============================================================
//  Firebase (체육 채점 앱 패턴 계승)
// ============================================================
function isEmptyCfg(c){ return !c||!c.apiKey||c.apiKey==='YOUR_API_KEY'||(c.apiKey+'').includes('여기에'); }
function parseFirebaseConfig(text){
  if(!text||!text.trim()) return null; const cfg={};
  const keys=['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
  keys.forEach(k=>{ const m=text.match(new RegExp(k+'\\s*:\\s*["\'`]([^"\'`]+)["\'`]')); if(m) cfg[k]=m[1]; });
  if(!cfg.apiKey){ try{ const j=JSON.parse(text); keys.forEach(k=>{ if(j[k]) cfg[k]=j[k]; }); }catch(e){} }
  return (cfg.apiKey&&cfg.projectId)?cfg:null;
}
async function initFirebase(){
  let cfg=window.firebaseConfig;
  if(isEmptyCfg(cfg)){ try{ const s=localStorage.getItem('insung_fb_config'); if(s){ const p=JSON.parse(s); if(!isEmptyCfg(p)){ cfg=p; window.firebaseConfig=p; } } }catch(e){} }
  if(isEmptyCfg(cfg)){ setSync('local'); return false; }
  try{
    firebase.initializeApp(cfg); window.db=firebase.firestore();
    try{ await window.db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    try{ await firebase.auth().signInAnonymously(); }catch(e){}
    state.fbReady=true; setSync('online'); return true;
  }catch(e){ setSync('error',e.message); return false; }
}
const DOC=()=>window.db.collection('app').doc('data');
const FIELDS=['students','roster','submissions','peer','tests','classSessions','settings'];
async function loadFromFirestore(){
  try{ const snap=await DOC().get(); if(snap.exists){ const d=snap.data(); FIELDS.forEach(f=>{ if(d[f]!==undefined){ if(f==='settings') state.settings={...state.settings,...d.settings}; else state[f]=d[f]; } }); } }catch(e){}
}
let _saveTimer=null;
function save(){
  if(!state.fbReady){ saveLocal(); return; }
  state._localUpdatedAt=Date.now(); clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{ saveNow(); },150);
  saveLocal();
}
async function saveNow(){
  saveLocal();
  if(!state.fbReady){ return; }
  state._localUpdatedAt=Date.now();
  try{ const payload={updatedBy:state.clientId, updatedAt:firebase.firestore.FieldValue.serverTimestamp()}; FIELDS.forEach(f=>payload[f]=state[f]); await DOC().set(payload,{merge:true}); }
  catch(e){ saveLocal(); }
}
function saveLocal(){ try{ const o={}; FIELDS.forEach(f=>o[f]=state[f]); localStorage.setItem('insung_data',JSON.stringify(o)); }catch(e){} }
function loadLocal(){ try{ const s=localStorage.getItem('insung_data'); if(s){ const d=JSON.parse(s); FIELDS.forEach(f=>{ if(d[f]!==undefined){ if(f==='settings') state.settings={...state.settings,...d.settings}; else state[f]=d[f]; } }); } }catch(e){} }
// 누적형 데이터는 병합(덮어쓰기 방지) — 동시 사용 시 PIN·제출 유실 방지
function mergeServerData(d){
  // students: 학생별 병합 (pinHash 보존)
  if(d.students){ Object.keys(d.students).forEach(sid=>{ const sv=d.students[sid]; const lo=state.students[sid];
    if(!lo){ state.students[sid]=sv; }
    else { state.students[sid]={...sv, ...lo, pinHash: lo.pinHash||sv.pinHash, status: lo.status||sv.status }; } }); }
  if(d.roster){ state.roster={...d.roster, ...state.roster}; }
  // submissions: 학생별 ts 기준 합집합
  if(d.submissions){ Object.keys(d.submissions).forEach(sid=>{ const sv=d.submissions[sid]||[]; const lo=state.submissions[sid]||[];
    // ts 기준 합집합. 같은 제출이 양쪽에 있으면 _upd(마지막 수정시각)가 큰 쪽을 채택 → 교사의 플래그 해제/등급 확정이 동기화로 되돌아가지 않음. 동률이면 로컬(현재 세션) 우선.
    const byKey={}; [...sv,...lo].forEach(x=>{ const k=x.ts+'_'+(x.isTest?'t':'s'); const prev=byKey[k]; if(!prev){ byKey[k]=x; } else { byKey[k]=((x._upd||0)>=(prev._upd||0))?x:prev; } });
    const merged=Object.keys(byKey).map(k=>byKey[k]).sort((a,b)=>a.ts-b.ts); state.submissions[sid]=merged; }); }
  // tests: 학생별 pre/post 병합
  if(d.tests){ Object.keys(d.tests).forEach(sid=>{ state.tests[sid]={...(d.tests[sid]||{}), ...(state.tests[sid]||{})}; }); }
  // peer: ts+fromSid 기준 합집합
  if(d.peer){ ['praise','advice'].forEach(k=>{ const sv=(d.peer[k]||[]); const lo=(state.peer[k]||[]); const seen={}; const m=[]; [...sv,...lo].forEach(x=>{ const key=x.ts+'_'+x.fromSid+'_'+x.toSid; if(!seen[key]){seen[key]=1;m.push(x);} }); state.peer[k]=m; }); }
  if(d.classSessions){ state.classSessions={...d.classSessions, ...state.classSessions}; }
  if(d.settings){ state.settings={...state.settings, ...d.settings}; }
}
function startListener(){
  if(!window.db) return;
  state.fbUnsubscribe=DOC().onSnapshot({includeMetadataChanges:true},(snap)=>{
    if(snap.metadata.hasPendingWrites) return; if(!snap.exists) return;
    const d=snap.data(); if(d.updatedBy===state.clientId) return;
    mergeServerData(d);
    rerender();
  });
}

// ============================================================
//  Gemini AI 호출 (브라우저 직접, 무료 키)
// ============================================================
function geminiKey(){ return ((state.settings&&state.settings.geminiKey)||localStorage.getItem('insung_gemini_key')||window.geminiApiKey||'').trim(); }
// 전역 대기열 + 자동 재시도 (동시 사용·분당 한도 대응)
window._aiQueue = window._aiQueue || Promise.resolve();
window._aiQueueLen = 0;
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function callGemini(prompt, opts){
  opts=opts||{};
  // 큐에 넣어 한 번에 하나씩 순차 처리 (종칠 때 동시 호출 폭주 방지)
  window._aiQueueLen++;
  const myTurn = window._aiQueue.then(()=>_callGeminiWithRetry(prompt, opts));
  window._aiQueue = myTurn.catch(()=>{}).then(()=>{ window._aiQueueLen=Math.max(0,window._aiQueueLen-1); });
  return myTurn;
}
async function _callGeminiWithRetry(prompt, opts){
  const maxRetry = opts.retries!=null?opts.retries:3;
  let wait = 1500;
  for(let attempt=0; attempt<=maxRetry; attempt++){
    const r = await _callGeminiRaw(prompt, opts);
    if(r.ok) return r.text;
    // 재시도 가능한 오류(429 한도초과, 500/503 일시오류, 타임아웃)면 잠시 후 재시도
    if(r.retryable && attempt<maxRetry){
      if(typeof opts.onWait==='function') opts.onWait(attempt+1, maxRetry);
      await sleep(wait + Math.random()*600); // 지터로 동시 재시도 분산
      wait = Math.min(wait*2, 12000); // 지수 백오프 (최대 12초)
      continue;
    }
    window._aiErr = r.err || 'AI 호출 실패';
    return null;
  }
  return null;
}
async function _callGeminiRaw(prompt, opts){
  opts=opts||{};
  const key=geminiKey(); if(!key){ return {ok:false, retryable:false, err:'AI 키가 없어요. 관리자 → 연결·AI 설정에서 키를 넣어주세요.'}; }
  if(!/^(AIza|AQ\.)/.test(key)){ return {ok:false, retryable:false, err:'키 형식이 올바르지 않아요. Gemini 키는 보통 AIza 또는 AQ.로 시작해요. AI Studio에서 발급한 키를 다시 확인해주세요.'}; }
  let models=['gemini-3-flash','gemini-3-flash-preview','gemini-flash-latest','gemini-2.5-flash','gemini-2.5-flash-lite'];
  const good=localStorage.getItem('insung_gemini_model');
  if(good && models.includes(good)) models=[good, ...models.filter(m=>m!==good)];
  let lastErr='', retryable=false;
  for(const model of models){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(), opts.timeout||30000);
      const genCfg={ maxOutputTokens:opts.maxTokens||500, temperature:opts.temperature!=null?opts.temperature:0.7 };
      if(opts.json) genCfg.responseMimeType='application/json';
      if(opts.fast) genCfg.thinkingConfig={ thinkingBudget:0 };
      const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent',{
        method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':key}, signal:ctrl.signal,
        body:JSON.stringify({ contents:[{ parts:[{ text:prompt }] }], generationConfig:genCfg })
      });
      clearTimeout(timer);
      if(res.ok){ const data=await res.json(); const t=data?.candidates?.[0]?.content?.parts?.[0]?.text; if(t){ window._aiErr=''; localStorage.setItem('insung_gemini_model',model); return {ok:true, text:t}; } lastErr='빈 응답'; continue; }
      const errData=await res.json().catch(()=>({}));
      lastErr=(errData?.error?.message)||('HTTP '+res.status);
      // 429(한도) / 500·503(일시) → 재시도 가능
      if(res.status===429){ retryable=true; lastErr='지금 사용자가 많아요(한도). 잠시 후 자동으로 다시 시도해요.'; break; }
      if(res.status===500||res.status===503){ retryable=true; break; }
      // 키 거부(403/400) → 재시도 불가, 즉시 중단
      if(res.status===403 || (res.status===400 && /api[_\s]?key|API key|key not valid|invalid.*key|key.*invalid/i.test(lastErr))){ return {ok:false, retryable:false, err:'키가 거부됐어요: '+lastErr+'\n\nGoogle AI Studio에서 키가 활성 상태인지, Generative Language API가 켜져 있는지 확인해주세요. (AQ.로 시작하는 키가 안 되면, 새 프로젝트로 AIza 키 발급을 시도해보세요.)'}; }
      // 그 외 400(파라미터 등) → 다음 모델 시도
      // 404(모델 없음) → 다음 모델 시도
    }catch(e){ if(e.name==='AbortError'){ retryable=true; lastErr='응답이 느려요. 다시 시도해요.'; } else { lastErr=e.message+' (네트워크/CORS일 수 있어요)'; } }
  }
  return {ok:false, retryable, err:'AI 호출 실패: '+lastErr};
}

// ============================================================
//  렌더 라우터 (화면 함수는 아래 블록에서 정의)
// ============================================================
function rerender(){
  if(!state.me){ renderLogin(); return; }
  if(state.view==='admin'){ renderAdmin(); return; }
  if(state.view==='flow'){ renderFlow(); return; }
  if(state.view==='test'){ renderTest(state.draft._due); return; }

function autoSession(cls){
  const studs=Object.keys(state.students).filter(sid=>clsOf(sid)===cls).concat(Object.keys(state.roster).filter(sid=>clsOf(sid)===cls));
  const uniq=[...new Set(studs)];
  // 각 수업일(날짜)별로, 그날 일상제출(검사 제외)한 학생 수와 2회 이상 제출 학생 수 집계
  const dayMap={}; // day -> {students:Set, twice:count}
  uniq.forEach(sid=>{
    const byDay={};
    (state.submissions[sid]||[]).forEach(x=>{ if(x.isTest) return; const dk=todayKey(x.ts); byDay[dk]=(byDay[dk]||0)+1; });
    Object.keys(byDay).forEach(dk=>{ if(!dayMap[dk]) dayMap[dk]={studs:0,twice:0}; dayMap[dk].studs++; if(byDay[dk]>=2) dayMap[dk].twice++; });

  let sessions=0;

function micButton(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return '';
  return `<button onclick="startVoice('${targetId}')" id="mic-${targetId}" class="tap float-right text-[11px] text-teal-600 bg-teal-50 px-2 py-1 rounded-lg mb-1">🎤 말로 입력</button>`;
}
let _recognizer=null, _voiceActive=false;
function startVoice(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('이 브라우저는 음성 입력을 지원하지 않아요.'); return; }
  const btn=document.getElementById('mic-'+targetId); const ta=document.getElementById(targetId);
  if(!ta) return;
  const resetBtn=()=>{ if(btn){btn.textContent='🎤 말로 입력';btn.classList.remove('bg-red-100','text-red-600');} };
  // 이미 듣는 중이면 정지
  if(_recognizer){ _voiceActive=false; try{_recognizer.onend=null;_recognizer.stop();}catch(e){} _recognizer=null; resetBtn(); return; }
  const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
  let finalText = ta.value ? ta.value + ' ' : '';   // 기존 내용 보존(누적 버퍼)
  _voiceActive=true;
  const r=new SR(); _recognizer=r;
  r.lang='ko-KR'; r.interimResults=true;
  // 모바일은 continuous에서 같은 결과를 중복 보고하는 버그가 있어 false로 두고 onend에서 자동 재시작
  r.continuous = !isMobile;
  r.onresult=(e)=>{
    let interim='';
    // 표준 방식: 이번에 새로 바뀐 결과(resultIndex)부터만 처리 → 확정문장 중복 합산 방지
    for(let i=e.resultIndex; i<e.results.length; i++){
      const res=e.results[i]; const t=res[0].transcript;
      if(res.isFinal) finalText += t; else interim += t;
    }
    ta.value = finalText + interim;
    if(ta.oninput) ta.oninput({target:ta});
  };
  r.onerror=(ev)=>{ if(ev && (ev.error==='no-speech'||ev.error==='aborted')) return; _voiceActive=false; resetBtn(); _recognizer=null; };
  r.onend=()=>{ if(_voiceActive && isMobile){ try{ r.start(); }catch(e){ _voiceActive=false; resetBtn(); _recognizer=null; } } else { resetBtn(); _recognizer=null; } };
  if(btn){ btn.textContent='⏹ 듣는 중… (눌러서 멈춤)'; btn.classList.add('bg-red-100','text-red-600'); }
  try{ r.start(); }catch(e){ toast('마이크를 시작할 수 없어요.'); _voiceActive=false; _recognizer=null; resetBtn(); }
}

async function doFinalSubmit(){

  // 필수: 성찰 한 줄

    const weak = txt.length<25 || /(.)\1{4,}/.test(txt) || /^[ㄱ-ㅎㅏ-ㅣ\s]+$/.test(txt);
    if(weak){
      const ok=await confirmModal({title:'성찰이 너무 짧아요', body:'성찰이 짧아 미흡으로 분류될 수 있어요. 미흡이면 이번 제출은 인정되지 않을 수 있어요. (작성 내용·날짜·학번은 기록으로 남아요)\n\n그래도 제출할까요?', ok:'제출하기', cancel:'더 쓸게요', danger:true});
      if(!ok){ d.step=8; renderFlow(); return; }
      gateRejected=true; reflectGrade='미흡';
    }
  }
  // 경고2: 하루 2회
  const todays=(state.submissions[sid]||[]).filter(x=>todayKey(x.ts)===todayKey());
  if(todays.length>=1 && s.flagDupSubmit){
    const ok=await confirmModal({title:'한 번 더 확인할게요', body:'인성 실천 포트폴리오는 수업시간에 제출합니다. 같은 날 2번 이상 제출은 부정행위가 될 수 있어요. (제출 날짜와 시간이 자동 입력됩니다.) 계속하시겠습니까?', ok:'계속 제출', cancel:'취소', danger:true});
    if(!ok){ d.step=stepIdx('peer'); renderFlow(); return; }
  }
  // 경고3: 복붙(이전 성찰과 동일)
  if(s.flagDupText){
    const prev=(state.submissions[sid]||[]).map(x=>(x.reflect&&x.reflect.text)||'');
    const dupIdx=prev.findIndex(p=>p && p===(d.reflect.text||'').trim());
    if(dupIdx>=0){
      const ok=await confirmModal({title:'같은 내용이 있어요', body:(dupIdx+1)+'회차에 작성한 내용과 똑같아요. 선생님이 확인할 수 있어요.\n\n제출할까요? (제출은 1회로 인정됩니다)', ok:'제출하기', cancel:'다시 쓸게요', danger:true});
      if(!ok){ d.step=8; renderFlow(); return; }

// 브라우저 기본 confirm(주소 노출) 대신 쓰는 커스텀 확인창 → Promise<boolean>
function confirmModal(opts){
  opts=opts||{};
  const title=opts.title||'', body=opts.body||'', ok=opts.ok||'확인', cancel=opts.cancel||'취소', danger=opts.danger;
  return new Promise(resolve=>{
    const m=el(`<div id="cfm-modal" class="modal-full bg-black/60 flex items-center justify-center p-6">

        </div>
      </div></div>`);
    modal(m);

}

function computeTestScores(answers){
  // 구인별 평균 (1~5), 역채점 문항은 6-v로 뒤집음
  const {items}=testItems(); const byF={};
  items.forEach(it=>{ let v=answers[it.id]; if(v){ if(it.rev) v=6-v; (byF[it.factor]=byF[it.factor]||[]).push(v); } });
  const out={}; Object.keys(byF).forEach(f=>{ out[f]=byF[f].reduce((a,b)=>a+b,0)/byF[f].length; });
  return out;
}

function allDataSids(){ // roster + students + 제출/검사 데이터가 있는 모든 학번
  const set={};
  Object.keys(state.roster).forEach(s=>set[s]=1);
  Object.keys(state.students).forEach(s=>set[s]=1);
  Object.keys(state.submissions).forEach(s=>{ if((state.submissions[s]||[]).length) set[s]=1; });
  Object.keys(state.tests).forEach(s=>{ if(state.tests[s]&&Object.keys(state.tests[s]).length) set[s]=1; });
  return Object.keys(set);
}
function isExcluded(sid){ const st=(state.students[sid]||{}).status; return st==='out'||st==='quit'; }

function excludedAsOf(sid, dateKey){ const s=state.students[sid]||{}; if(s.status!=='out'&&s.status!=='quit') return false; if(!s.statusDate) return true; return dateKey >= s.statusDate; }
function allClasses(){ const set={}; allDataSids().forEach(sid=>{ if(!isExcluded(sid)) set[clsOf(sid)]=true; }); return Object.keys(set).sort(); }
function studentsOf(cls){ const set={}; allDataSids().forEach(sid=>{ if(clsOf(sid)===cls && !isExcluded(sid)) set[sid]=true; }); return Object.keys(set).sort((a,b)=>+a.slice(3)-+b.slice(3)); }

function parseGrade(res){ // "충실|이유" 또는 "충실 - 이유" 파싱
  const m=(res||'').match(/(충실|보통|미흡)\s*[|:\-–]\s*(.+)/s);
  if(m) return {grade:m[1], reason:m[2].trim().replace(/\s+/g,' ').slice(0,240)};
  const g=(res||'').match(/(충실|보통|미흡)/);
  return {grade:g?g[1]:'보통', reason:(res||'').replace(/\n/g,' ').trim().slice(0,240)};
}

// --- 검사 결과 분석 (개인/학급/학년 + 사전/사후/전체 + 엑셀) ---
function admin_growth(){
  const d=state.draft; d._gView=d._gView||'all'; d._gScope=d._gScope||'both'; d._gPerson=d._gPerson||'';
  renderGrowth();
}
function growthFactors(){ for(const sid in state.tests){ const t=state.tests[sid]; if(t.pre) return Object.keys(t.pre.scores); if(t.post) return Object.keys(t.post.scores); } return []; }
function gradeChip(h){ return `<span class="text-[10px] px-1.5 py-0.5 rounded" style="background:${gradeColor(h)}22;color:${gradeColor(h)}">${h}점 ${gradeOf(h)}</span>`; }
function renderGrowth(){
  const d=state.draft; const view=d._gView, scope=d._gScope;
  const factors=growthFactors();
  // 대상 학생 풀
  function pool(){ if(view==='person'&&d._gPerson) return [d._gPerson];
    let arr=Object.keys(state.tests);
    if(view==='class'&&d._gClass) arr=arr.filter(sid=>clsOf(sid)===d._gClass);
    if(view==='grade'&&d._gGrade) arr=arr.filter(sid=>sid.slice(0,1)===d._gGrade);
    return arr; }
  const sids=pool();
  // 평균 계산
  function meanH(kind,f){ const vals=sids.map(sid=>{ const t=state.tests[sid]||{}; return t[kind]?t[kind].scores[f]:null; }).filter(v=>v!=null); return vals.length?toHundred(vals.reduce((a,b)=>a+b,0)/vals.length):null; }
  const preH=factors.map(f=>meanH('pre',f));
  const postH=factors.map(f=>meanH('post',f));
  // 탭 버튼
  const viewTab=(k,l)=>`<button onclick="setGrowthView('${k}')" class="tap px-3 py-1.5 rounded-lg text-xs font-semibold ${view===k?'bg-violet-600 text-white':'bg-slate-100 text-slate-500'}">${l}</button>`;
  const scopeTab=(k,l)=>`<button onclick="setGrowthScope('${k}')" class="tap flex-1 py-1.5 rounded text-[11px] ${scope===k?'bg-teal-600 text-white':'bg-slate-100 text-slate-500'}">${l}</button>`;
  // 선택 드롭다운
  let picker='';
  if(view==='class'){ const cs=allClasses(); if(!d._gClass) d._gClass=cs[0]||''; picker=`<select onchange="state.draft._gClass=this.value;renderGrowth()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-2">${cs.map(c=>`<option value="${c}" ${d._gClass===c?'selected':''}>${clsLabel(c)}</option>`).join('')}</select>`; }
  if(view==='grade'){ const gs=[...new Set(Object.keys(state.tests).map(sid=>sid.slice(0,1)))].sort(); if(!d._gGrade) d._gGrade=gs[0]||''; picker=`<select onchange="state.draft._gGrade=this.value;renderGrowth()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-2">${gs.map(g=>`<option value="${g}" ${d._gGrade===g?'selected':''}>${g}학년</option>`).join('')}</select>`; }
  if(view==='person'){
    const cs=allClasses(); if(!d._gPersonClass) d._gPersonClass=cs[0]||'';
    const studs=Object.keys(state.tests).filter(sid=>clsOf(sid)===d._gPersonClass).sort((a,b)=>+a.slice(3)-+b.slice(3));
    const clsSel=`<select onchange="state.draft._gPersonClass=this.value;state.draft._gPerson='';renderGrowth()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-2">${cs.map(c=>`<option value="${c}" ${d._gPersonClass===c?'selected':''}>${clsLabel(c)} (${Object.keys(state.tests).filter(s=>clsOf(s)===c).length}명)</option>`).join('')}</select>`;
    const chips=studs.length?`<div class="flex flex-wrap gap-1.5 mb-2">${studs.map(sid=>{ const on=d._gPerson===sid; const t=state.tests[sid]||{}; const dot=t.post?'●':t.pre?'◐':'○'; return `<button onclick="state.draft._gPerson='${sid}';renderGrowth()" class="tap px-2.5 py-1.5 rounded-lg text-[11px] ${on?'bg-violet-600 text-white':'bg-slate-100 text-slate-600'}">${dot} ${esc(nameOf(sid)||sid)}</button>`; }).join('')}</div>`:'<p class="text-[11px] text-slate-400 mb-2">이 반에 검사 데이터가 있는 학생이 없어요.</p>';
    picker=clsSel+chips+'<p class="text-[9px] text-slate-400 mb-1">● 사전·사후 완료 / ◐ 사전만 / ○ 미응시</p>';
    if(!d._gPerson && studs.length) d._gPerson=studs[0];
  }
  // 구인별 행
  const rows=factors.map((f,i)=>{
    const pre=preH[i], post=postH[i]; const showPre=scope!=='post', showPost=scope!=='pre';
    const diff=(pre!=null&&post!=null)?post-pre:null;
    return `<div class="bg-slate-50 rounded-lg p-2.5 mb-1.5">
      <div class="flex justify-between items-center mb-1"><span class="text-sm font-semibold text-slate-700">${esc(f)}</span>
        ${(diff!=null&&scope==='both')?`<span class="text-[11px] font-bold ${diff>0?'text-teal-600':diff<0?'text-red-500':'text-slate-400'}">${diff>0?'▲+'+diff:diff<0?'▼'+diff:'─'}</span>`:''}</div>
      ${showPre&&pre!=null?`<div class="flex items-center gap-2 text-[11px]"><span class="text-slate-400 w-8">사전</span><div class="flex-1 h-2 bg-slate-200 rounded"><div class="h-2 rounded" style="width:${pre}%;background:${gradeColor(pre)}"></div></div><span class="w-14 text-right" style="color:${gradeColor(pre)}">${pre} ${gradeOf(pre)}</span></div>`:''}
      ${showPost&&post!=null?`<div class="flex items-center gap-2 text-[11px] mt-1"><span class="text-slate-400 w-8">사후</span><div class="flex-1 h-2 bg-slate-200 rounded"><div class="h-2 rounded" style="width:${post}%;background:${gradeColor(post)}"></div></div><span class="w-14 text-right" style="color:${gradeColor(post)}">${post} ${gradeOf(post)}</span></div>`:''}
      ${(showPre&&pre==null)&&(showPost&&post==null)?'<p class="text-[10px] text-slate-400">데이터 없음</p>':''}
    </div>`;
  }).join('');
  // 개인일 때 종합
  let personSummary='';

function exportDetailCsv(){
  const {scope,val}=getScope('ex'); const sids=sidsInScope(scope,val,activeSids());
  if(!sids.length){ toast('대상이 없어요.'); return; }
  const cl=content().checklist; const comps=content().selCompetencies;
  const head=['학번','이름','날짜','감정색깔','감정','선택감정들','상황설명','신체활동','공동체체크','약속실천','약속미실천사유','SEL역량','SEL하위역량','다짐','지난다짐실천','오늘돌아보기','동료대상','동료내용'];
  let csv=head.join(',')+'\n';
  const doneLabel={yes:'실천함',partial:'부분',no:'못함'};
  sids.forEach(sid=>{
    (state.submissions[sid]||[]).filter(x=>!x.isTest).forEach(x=>{
      const dt=new Date(x.ts); const dateStr=dt.getFullYear()+'. '+(dt.getMonth()+1)+'. '+dt.getDate()+'.';
      const checks=[]; Object.keys(x.checks||{}).forEach(k=>{ if(x.checks[k]){ const [gi,ii]=k.split('_').map(Number); if(cl[gi]&&cl[gi].items[ii]) checks.push(cl[gi].virtue+':'+cl[gi].items[ii]); } });
      const proms=[]; Object.keys(x.promises||{}).forEach(pi=>{ if(x.promises[pi]){ const p=(content().promises||[])[pi]; if(p) proms.push(p.act); } });
      let selList=[]; if(x.sel){ if(Array.isArray(x.sel.picks)) selList=x.sel.picks; else if(x.sel.picked!=null) selList=[{comp:x.sel.picked,sub:x.sel.sub}]; }
      const selFormal=selList.map(p=>(comps[p.comp]||{}).formal||'').filter(Boolean).join(';');
      const selSub=selList.map(p=>{ const c=comps[p.comp]; if(!c) return ''; const subs=Array.isArray(p.subs)?p.subs:(p.sub!=null?[p.sub]:[]); return subs.map(si=>c.subs[si]&&c.subs[si].name).filter(Boolean).join('·'); }).filter(Boolean).join(';');
      const mood=x.mood||{}; const vr=x.vowRecall||{};
      const peers=[...state.peer.praise,...state.peer.advice].filter(p=>p.fromSid===sid && todayKey(p.ts)===todayKey(x.ts));
      const peerTo=peers.map(p=>nameOf(p.toSid)||p.toSid).join(';');
      const peerTxt=peers.map(p=>p.text).join(' | ');
      const row=[sid, nameOf(sid)||'', dateStr, mood.color||'', mood.word||'', '',
        (x.situation&&x.situation.text)||'', (x.situation&&x.situation.activity)||'', checks.join(';'), proms.join(';'), x.pmReason||'',
        selFormal, selSub,
        (x.reflect&&x.reflect.vow)||x.vow||'', doneLabel[vr.done]||'', (x.reflect&&x.reflect.text)||'', peerTo, peerTxt];
      csv+=row.map(csvCell).join(',')+'\n';
    });
  });
  dlCsv(csv,'인성평가_상세기록_'+scopeLabel(scope,val)+'.csv');
}

function uploadSchoolLogo(file){
  if(!file){ return; }
  if(!/^image\//.test(file.type)){ toast('이미지 파일을 선택하세요.'); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      // 256px 정사각으로 축소(원형 표시) → dataURL 용량 절감
      const SZ=256; const cv=document.createElement('canvas'); cv.width=SZ; cv.height=SZ;
      const ctx=cv.getContext('2d');
      const scale=Math.min(SZ/img.width, SZ/img.height); const w=img.width*scale, h=img.height*scale;
      ctx.clearRect(0,0,SZ,SZ); ctx.drawImage(img,(SZ-w)/2,(SZ-h)/2,w,h);
      const data=cv.toDataURL('image/png');
      state.settings.schoolLogo=data; saveNow(); toast('로고를 저장했어요.'); admin_settings();
    };
    img.onerror=()=>toast('이미지를 읽지 못했어요.');
    img.src=reader.result;
  };
  reader.onerror=()=>toast('파일을 읽지 못했어요.');
  reader.readAsDataURL(file);
}

function readTestXls(file){
  if(!file) return;
  const target=($('#xls-target')&&$('#xls-target').value)||'sel';
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const items=parseTestRows(rows, target);
      if(!items.length){ toast('문항을 찾지 못했어요. 양식을 확인해주세요.'); return; }
      const cont=JSON.parse(JSON.stringify(state.settings.content||window.DEFAULT_CONTENT));
      if(target==='sel') cont.selTest.items=items; else cont.communityTest.items=items;
      state.settings.content=cont; save();
      toast(items.length+'문항을 반영했어요 ✓'); closeModal('sheet'); admin_contentEdit();
    }catch(err){ toast('엑셀을 읽지 못했어요: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function parseTestRows(rows, target){
  let hi=-1, colItem=-1, colArea=-1, colFactor=-1, colNote=-1;
  for(let i=0;i<rows.length;i++){ const r=rows[i].map(x=>String(x).trim());
    const ix=r.findIndex(x=>x.includes('문항')); if(ix>=0){ hi=i; colItem=ix;
      colArea=r.findIndex(x=>x==='영역'); colFactor=r.findIndex(x=>x.includes('하위'));
      const cv=r.findIndex(x=>x==='변인명'); if(cv>=0) colFactor=cv;
      colNote=r.findIndex(x=>x.includes('비고')); break; } }
  if(hi<0) return [];
  const items=[]; let curF=''; const cnt={};
  const fmapSel={'공동체 의식':'com','협업':'coo','갈등해결':'con','스트레스 대처':'str','회복탄력성':'res'};
  const scn={'공동체 의식':'social','협업':'social','갈등해결':'social','스트레스 대처':'emotion','회복탄력성':'emotion'};
  for(let i=hi+1;i<rows.length;i++){ const r=rows[i].map(x=>String(x).trim());
    if(colFactor>=0 && r[colFactor]) curF=r[colFactor];
    const t=r[colItem]; if(!t||t.length<6) continue;
    const rev = colNote>=0 && (r[colNote]==='역채점' || r[colNote].includes('역') || r[colNote]==='+1');
    const pre= target==='sel' ? (fmapSel[curF]||'q') : (curF||'q');
    cnt[pre]=(cnt[pre]||0)+1;
    const it={ id:(target==='sel'?(fmapSel[curF]||'q'):'c')+(cnt[pre]), factor:curF, t:t.replace(' +1','').trim(), rev:!!rev };
    if(target==='sel') it.scn=scn[curF]||'social';
    items.push(it);
  }
  return items;
}

function dropRoster(e){ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) readRoster(f); }
function readRoster(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let added=0;
      rows.forEach(r=>{ const g=String(r[0]).trim(), cl=String(r[1]).trim(), num=String(r[2]).trim(), nm=String(r[3]).trim();
        if(/^\d$/.test(g) && /^\d+$/.test(cl) && /^\d+$/.test(num) && nm && nm!=='이름'){
          const sid=makeSid(g,cl,num); state.roster[sid]={grade:+g,cls:+cl,num:+num,name:nm}; added++;
        } });
      if(!added){ toast('인식된 학생이 없어요. 양식(학년·반·번호·이름)을 확인하세요.'); return; }
      saveNow(); toast(added+'명을 등록·저장했어요 ✓'); closeModal('sheet'); admin_roster();
    }catch(err){ toast('엑셀을 읽지 못했어요: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function addStudent(){
  const g=prompt('학년 (1자리)'); if(!g) return;

  const num=prompt('번호 (숫자)'); if(!num) return;
  const nm=prompt('이름'); if(!nm) return;
  if(!/^\d$/.test(g.trim())||!/^\d+$/.test(cl.trim())||!/^\d+$/.test(num.trim())){ toast('학년·반·번호는 숫자로.'); return; }
  const sid=makeSid(g,cl,num); state.roster[sid]={grade:+g,cls:+cl,num:+num,name:nm.trim()}; saveNow(); toast(sid+' '+nm+' 추가'); closeModal('sheet'); admin_roster();
}

function setStudentStatus(sid,st){
  if(!state.students[sid]) state.students[sid]={cls:clsOf(sid),name:nameOf(sid),status:st};

      <span class="text-violet-500">※ 결제수단을 연결하지 않으면 요금이 청구되지 않아요(한도 초과 시 작동만 멈춤).</span>
    </div>
    <button onclick="window.open('https://aistudio.google.com/app/apikey','_blank')" class="tap w-full py-2 bg-violet-600 text-white rounded-lg text-xs font-semibold mb-2">✨ AI Studio에서 키 발급</button>
    <input id="ai-input" type="text" placeholder="AIza... 또는 AQ...." value="${esc(savedKey)}" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-[11px] font-mono mb-2">
    <button onclick="saveAi()" class="tap w-full py-2.5 bg-violet-600 text-white rounded-lg text-sm font-bold">💾 AI 키 저장</button>
    ${savedKey?`<button onclick="$('#ai-input').value='';saveAi()" class="tap w-full mt-2 py-2 bg-slate-100 rounded-lg text-xs text-slate-500">AI 키 지우기</button>`:''}
  `);
  setTimeout(()=>{ if($('#fb-input')&&$('#fb-status')) fbInputChanged(); },60);
}
function saveFb(){ const cfg=parseFirebaseConfig($('#fb-input').value); if(!cfg){ toast('firebaseConfig 코드를 인식하지 못했어요.'); return; } localStorage.setItem('insung_fb_config',JSON.stringify(cfg)); toast('저장했어요. 새로고침하면 연결됩니다.'); setTimeout(()=>location.reload(),900); }
function clearFb(){ if(confirm('동기화 설정을 삭제할까요?')){ localStorage.removeItem('insung_fb_config'); location.reload(); } }
const FB_RULES_TXT="rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if request.auth != null;\n    }\n  }\n}";
function fbInputChanged(){ const el=$('#fb-input'); if(!el) return; const cfg=parseFirebaseConfig(el.value); const st=$('#fb-status'), after=$('#fb-after');
  if(cfg){ window._fbPid=cfg.projectId; if(st){ st.innerHTML='✅ 인식 완료: <b>'+esc(cfg.projectId)+'</b> — 아래 버튼이 이 프로젝트로 바로 열려요'; st.className='text-[11px] font-bold text-teal-700 mt-1'; } if(after) after.style.display=''; }
  else { window._fbPid=null; if(st){ st.textContent=el.value.trim()?'아직 인식 안 됨 — apiKey가 포함된 코드 전체를 붙여넣어 주세요':'붙여넣으면 자동으로 인식해요'; st.className='text-[11px] text-slate-400 mt-1'; } if(after) after.style.display='none'; } }
function openFbPage(kind){ const pid=window._fbPid; let u='https://console.firebase.google.com'; if(pid){ if(kind==='auth') u+='/project/'+pid+'/authentication/providers'; else if(kind==='fs') u+='/project/'+pid+'/firestore'; else if(kind==='rules') u+='/project/'+pid+'/firestore/databases/-default-/rules'; } window.open(u,'_blank'); }
function copyRules(){ const done=()=>toast('규칙 코드를 복사했어요 📋 규칙 칸을 비우고 붙여넣은 뒤 [게시]'); const fb=()=>{ const ta=document.createElement('textarea'); ta.value=FB_RULES_TXT; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); }catch(e){} ta.remove(); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(FB_RULES_TXT).then(done).catch(()=>{ fb(); done(); }); } else { fb(); done(); } }
function saveAi(){ const v=($('#ai-input').value||'').trim(); state.settings.geminiKey=v; localStorage.setItem('insung_gemini_key',v); window.geminiApiKey=v; save(); toast(v?'AI 키를 저장했어요 ✨ 모든 기기에서 켜져요':'AI 키를 비웠어요'); }
</script>
<script id="boot">
// ===== 휴대폰 뒤로가기 처리 (이전 화면 이동 + 시작화면 더블탭 종료) =====
let _exitArmed=false, _exitTimer=null;
function appCanGoBack(){
  if(document.querySelector('#modal-root > *')) return true;   // 모달 열림
  const v=state.view;
  if(v==='flow') return true;     // 단계 뒤로 / 홈
  if(v==='test') return true;     // 검사 → 홈
  if(v==='admin') return true;    // 관리자 → 학생화면
  return false;                    // 로그인/홈 = 루트
}
function appGoBack(){
  // 모달이 열려 있으면 가장 위 모달만 닫기
  const modals=document.querySelectorAll('#modal-root > *');
  if(modals.length){ modals[modals.length-1].remove(); return; }
  const v=state.view;
  if(v==='flow'){ const st=(state.draft&&state.draft.step)||1; if(st>1){ goStep(st-1); } else { state.draft={}; state.view='home'; renderHome(); } return; }
  if(v==='test'){ state.view='home'; renderHome(); return; }
  if(v==='admin'){ renderLogin(); return; }
}
function setupBackButton(){
  try{ history.pushState({app:1},''); }catch(e){}
  window.addEventListener('popstate', ()=>{
    if(appCanGoBack()){
      appGoBack();
      try{ history.pushState({app:1},''); }catch(e){}   // 앱 안에 머무름
      return;
    }
    // 루트(시작/홈) — 한 번 더 누르면 종료
    if(_exitArmed){
      clearTimeout(_exitTimer); _exitArmed=false;
      history.back();   // 센티넬 밖으로 → 앱 종료(또는 이전 페이지)
      return;
    }
    _exitArmed=true;
    toast('한 번 더 누르면 종료됩니다');
    try{ history.pushState({app:1},''); }catch(e){}
    _exitTimer=setTimeout(()=>{ _exitArmed=false; }, 2000);
  });
}
async function boot(){
  loadLocal();
  setupBackButton();
  const k=localStorage.getItem('insung_gemini_key'); if(k) window.geminiApiKey=k;
  window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); window._deferredPrompt=e; const b=document.getElementById('install-btn'); if(b) b.classList.remove('hidden'); });
  const ok=await initFirebase();
  if(ok){ await loadFromFirestore(); startListener(); } else { setSync('local'); }
  rerender();
  // 서비스워커: 새 버전 자동 적용 (캐시로 옛 화면 고정되는 문제 방지)
  if('serviceWorker' in navigator){
    try{
      const reg=await navigator.serviceWorker.register('sw.js');
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(nw) nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            // 새 버전 준비됨 → 한 번만 자동 새로고침
            if(!window._reloadedForSW){ window._reloadedForSW=true; location.reload(); }
          }
        });
      });
      reg.update();
    }catch(e){}
  }
}
boot();
</script>
